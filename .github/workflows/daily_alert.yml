name: Daily Rare Bird Alert

on:
  schedule:
    # Run daily at 1pm UTC (adjust to your timezone preference)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Send rare bird alert
        env:
          EBIRD_API_KEY: ${{ secrets.EBIRD_API_KEY }}
          REGION_CODE: ${{ secrets.REGION_CODE }}
          DAYS_BACK: ${{ secrets.DAYS_BACK || '1' }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: '587'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: uv run rare-bird-alerts
